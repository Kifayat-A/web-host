
<style>
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes subpixelOn { from { opacity:0.08; transform:scaleY(0.3); } to { opacity:1; transform:scaleY(1); } }
  @keyframes mergeGlow { from { opacity:0; transform:scale(0.7); } to { opacity:1; transform:scale(1); } }
  @keyframes beam { from { stroke-dashoffset: 60; opacity:0; } to { stroke-dashoffset: 0; opacity:0.6; } }
  .sp { border-radius: 3px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; transition: opacity 0.4s, height 0.4s; }
  .chan-card { border:0.5px solid; border-radius: var(--border-radius-lg); padding:12px; display:flex; flex-direction:column; align-items:center; gap:8px; transition: transform 0.3s; }
  .chan-card:hover { transform: translateY(-2px); }
  .val-badge { border-radius: 20px; padding: 3px 10px; font-size:12px; font-weight:500; }
  #pixel-merged { width:90px; height:90px; border-radius:12px; border:2px solid rgba(255,255,255,0.18); transition: background 0.5s; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; color:#fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); flex-direction:column; gap:2px; }
  .subpx-col { display:flex; flex-direction:column; gap:2px; }
  .anim-in { animation: fadeUp 0.5s ease both; }
  .beam-line { stroke-dasharray: 60; animation: beam 0.6s ease both; }
</style>



<div style="padding:1rem 0;">

  <div style="display:grid; grid-template-columns: 1fr auto 1fr; gap:0; align-items:center; min-height:320px;">

    <div style="display:flex; flex-direction:column; gap:10px; padding-right:12px;">

      <div class="chan-card anim-in" style="border-color:#ff4444; background:rgba(255,68,68,0.08); animation-delay:0.05s;">
        <div style="display:flex;align-items:center;gap:8px;width:100%;">
          <div style="width:14px;height:14px;border-radius:3px;background:#ff4444;flex-shrink:0;"></div>
          <span style="font-size:13px;font-weight:500;color:#cc2200;">Red channel</span>
        </div>
        <div style="display:flex;gap:3px;" id="sub-r">
          <div class="subpx-col">
            <div class="sp" id="sp-r1" style="width:22px;height:60px;background:#ff4444;opacity:0.08;"></div>
          </div>
          <div class="subpx-col">
            <div class="sp" id="sp-r2" style="width:22px;height:60px;background:#ff4444;opacity:0.08;"></div>
          </div>
          <div class="subpx-col">
            <div class="sp" id="sp-r3" style="width:22px;height:60px;background:#ff4444;opacity:0.08;"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;width:100%;margin-top:2px;">
          <input type="range" min="0" max="255" value="220" id="r-slider" step="1" style="flex:1;">
          <span class="val-badge" style="background:rgba(255,68,68,0.15);color:#cc2200;" id="r-val">220</span>
        </div>
      </div>

      <div class="chan-card anim-in" style="border-color:#22cc44; background:rgba(34,204,68,0.08); animation-delay:0.15s;">
        <div style="display:flex;align-items:center;gap:8px;width:100%;">
          <div style="width:14px;height:14px;border-radius:3px;background:#22cc44;flex-shrink:0;"></div>
          <span style="font-size:13px;font-weight:500;color:#1a7a30;">Green channel</span>
        </div>
        <div style="display:flex;gap:3px;" id="sub-g">
          <div class="subpx-col">
            <div class="sp" id="sp-g1" style="width:22px;height:60px;background:#22cc44;opacity:0.08;"></div>
          </div>
          <div class="subpx-col">
            <div class="sp" id="sp-g2" style="width:22px;height:60px;background:#22cc44;opacity:0.08;"></div>
          </div>
          <div class="subpx-col">
            <div class="sp" id="sp-g3" style="width:22px;height:60px;background:#22cc44;opacity:0.08;"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;width:100%;margin-top:2px;">
          <input type="range" min="0" max="255" value="90" id="g-slider" step="1" style="flex:1;">
          <span class="val-badge" style="background:rgba(34,204,68,0.15);color:#1a7a30;" id="g-val">90</span>
        </div>
      </div>

      <div class="chan-card anim-in" style="border-color:#4499ff; background:rgba(68,153,255,0.08); animation-delay:0.25s;">
        <div style="display:flex;align-items:center;gap:8px;width:100%;">
          <div style="width:14px;height:14px;border-radius:3px;background:#4499ff;flex-shrink:0;"></div>
          <span style="font-size:13px;font-weight:500;color:#1a5fcc;">Blue channel</span>
        </div>
        <div style="display:flex;gap:3px;" id="sub-b">
          <div class="subpx-col">
            <div class="sp" id="sp-b1" style="width:22px;height:60px;background:#4499ff;opacity:0.08;"></div>
          </div>
          <div class="subpx-col">
            <div class="sp" id="sp-b2" style="width:22px;height:60px;background:#4499ff;opacity:0.08;"></div>
          </div>
          <div class="subpx-col">
            <div class="sp" id="sp-b3" style="width:22px;height:60px;background:#4499ff;opacity:0.08;"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;width:100%;margin-top:2px;">
          <input type="range" min="0" max="255" value="50" id="b-slider" step="1" style="flex:1;">
          <span class="val-badge" style="background:rgba(68,153,255,0.15);color:#1a5fcc;" id="b-val">50</span>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 8px;">
      <svg width="80" height="280" viewBox="0 0 80 280" style="overflow:visible;">
        <line class="beam-line" id="beam-r" x1="4" y1="60" x2="76" y2="140" stroke="#ff4444" stroke-width="2" style="animation-delay:0.3s;"/>
        <line class="beam-line" id="beam-g" x1="4" y1="140" x2="76" y2="140" stroke="#22cc44" stroke-width="2" style="animation-delay:0.5s;"/>
        <line class="beam-line" id="beam-b" x1="4" y1="220" x2="76" y2="140" stroke="#4499ff" stroke-width="2" style="animation-delay:0.7s;"/>
        <text x="40" y="275" text-anchor="middle" font-size="11" fill="#888" font-family="sans-serif">combine</text>
      </svg>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding-left:12px;" class="anim-in" style="animation-delay:0.8s;">

      <div style="font-size:13px;color:var(--color-text-secondary);text-align:center;">Mixed pixel</div>

      <div id="pixel-merged">
        <span id="pixel-hex" style="font-size:12px;letter-spacing:0.05em;">#DC5A32</span>
        <span id="pixel-name" style="font-size:10px;opacity:0.85;">warm orange</span>
      </div>

      <div style="width:100%;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;display:flex;flex-direction:column;gap:6px;">
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:2px;">Sub-pixel layout (magnified)</div>
        <div style="display:flex;gap:2px;height:32px;border-radius:6px;overflow:hidden;" id="subpx-strip">
          <div id="spx-r" style="flex:1;background:#ff4444;transition:opacity 0.4s;"></div>
          <div id="spx-g" style="flex:1;background:#22cc44;transition:opacity 0.4s;"></div>
          <div id="spx-b" style="flex:1;background:#4499ff;transition:opacity 0.4s;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--color-text-tertiary);">
          <span>R</span><span>G</span><span>B</span>
        </div>
      </div>

      <div style="width:100%;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;">
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px;">rgb() values</div>
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--color-text-primary);">
          rgb(<span style="color:#cc2200;" id="mono-r">220</span>, <span style="color:#1a7a30;" id="mono-g">90</span>, <span style="color:#1a5fcc;" id="mono-b">50</span>)
        </div>
      </div>

      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;">
        <button onclick="setPreset(255,0,0)" style="font-size:11px;padding:4px 8px;">Red</button>
        <button onclick="setPreset(0,255,0)" style="font-size:11px;padding:4px 8px;">Green</button>
        <button onclick="setPreset(0,0,255)" style="font-size:11px;padding:4px 8px;">Blue</button>
        <button onclick="setPreset(255,255,0)" style="font-size:11px;padding:4px 8px;">Yellow</button>
        <button onclick="setPreset(255,255,255)" style="font-size:11px;padding:4px 8px;">White</button>
        <button onclick="setPreset(0,0,0)" style="font-size:11px;padding:4px 8px;">Black</button>
        <button onclick="randomColor()" style="font-size:11px;padding:4px 8px;">↻ Random</button>
      </div>
    </div>
  </div>

  <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary);padding-top:12px;">
    <span>Each channel: 0–255 (8 bits)</span>
    <span style="color:var(--color-border-secondary);">·</span>
    <span>Total combinations: 256³ = 16,777,216 colours</span>
    <span style="color:var(--color-border-secondary);">·</span>
    <span>The sub-pixels glow at proportional brightness</span>
  </div>
</div>

<script>
const rSlider = document.getElementById('r-slider');
const gSlider = document.getElementById('g-slider');
const bSlider = document.getElementById('b-slider');

function toHex(n) { return n.toString(16).padStart(2,'0').toUpperCase(); }

const colorNames = [
  [[255,0,0],'red'],[[0,255,0],'lime'],[[0,0,255],'blue'],
  [[255,255,0],'yellow'],[[0,255,255],'cyan'],[[255,0,255],'magenta'],
  [[255,255,255],'white'],[[0,0,0],'black'],[[128,128,128],'gray'],
  [[255,165,0],'orange'],[[128,0,128],'purple'],[[255,192,203],'pink'],
  [[0,128,128],'teal'],[[165,42,42],'brown'],[[255,69,0],'red-orange']
];

function nearestName(r,g,b) {
  let best='colour', bd=1e9;
  for(const[[cr,cg,cb],name] of colorNames) {
    const d = Math.abs(r-cr)+Math.abs(g-cg)+Math.abs(b-cb);
    if(d<bd){bd=d;best=name;}
  }
  return bd < 120 ? best : 'custom';
}

function update() {
  const r = +rSlider.value, g = +gSlider.value, b = +bSlider.value;

  document.getElementById('r-val').textContent = r;
  document.getElementById('g-val').textContent = g;
  document.getElementById('b-val').textContent = b;
  document.getElementById('mono-r').textContent = r;
  document.getElementById('mono-g').textContent = g;
  document.getElementById('mono-b').textContent = b;

  const hex = '#'+toHex(r)+toHex(g)+toHex(b);
  document.getElementById('pixel-merged').style.background = `rgb(${r},${g},${b})`;
  document.getElementById('pixel-hex').textContent = hex;
  document.getElementById('pixel-name').textContent = nearestName(r,g,b);

  const bright = (r*0.299 + g*0.587 + b*0.114) > 128;
  const tc = bright ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.9)';
  document.getElementById('pixel-hex').style.color = tc;
  document.getElementById('pixel-name').style.color = tc;

  const ro = r/255, go = g/255, bo = b/255;
  ['sp-r1','sp-r2','sp-r3'].forEach(id => { document.getElementById(id).style.opacity = Math.max(0.08, ro); });
  ['sp-g1','sp-g2','sp-g3'].forEach(id => { document.getElementById(id).style.opacity = Math.max(0.08, go); });
  ['sp-b1','sp-b2','sp-b3'].forEach(id => { document.getElementById(id).style.opacity = Math.max(0.08, bo); });

  ['sp-r1','sp-r2','sp-r3'].forEach(id => { document.getElementById(id).style.height = Math.round(8 + ro*52)+'px'; });
  ['sp-g1','sp-g2','sp-g3'].forEach(id => { document.getElementById(id).style.height = Math.round(8 + go*52)+'px'; });
  ['sp-b1','sp-b2','sp-b3'].forEach(id => { document.getElementById(id).style.height = Math.round(8 + bo*52)+'px'; });

  document.getElementById('spx-r').style.opacity = Math.max(0.12, ro);
  document.getElementById('spx-g').style.opacity = Math.max(0.12, go);
  document.getElementById('spx-b').style.opacity = Math.max(0.12, bo);
}

function setPreset(r,g,b) {
  rSlider.value = r; gSlider.value = g; bSlider.value = b;
  update();
}

function randomColor() {
  rSlider.value = Math.floor(Math.random()*256);
  gSlider.value = Math.floor(Math.random()*256);
  bSlider.value = Math.floor(Math.random()*256);
  update();
}

rSlider.addEventListener('input', update);
gSlider.addEventListener('input', update);
bSlider.addEventListener('input', update);

update();
</script>
